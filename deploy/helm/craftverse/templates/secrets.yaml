{{- /*
Database credential secret. Passwords are preserved across upgrades via lookup
(see craftverse.password helper) so they don't rotate on every `helm upgrade`.
*/ -}}
{{- $appPw := include "craftverse.password" (dict "ctx" . "explicit" .Values.db.appPassword "secret" "craftverse-db" "secretKey" "app-password") -}}
{{- $kcPw := include "craftverse.password" (dict "ctx" . "explicit" .Values.db.keycloakPassword "secret" "craftverse-db" "secretKey" "keycloak-password") -}}
{{- $rootPw := include "craftverse.password" (dict "ctx" . "explicit" .Values.db.rootPassword "secret" "craftverse-db" "secretKey" "root-password") -}}
apiVersion: v1
kind: Secret
metadata:
  name: craftverse-db
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: craftverse
type: Opaque
stringData:
  root-password: {{ $rootPw | quote }}
  app-username: {{ .Values.db.appUser | quote }}
  app-password: {{ $appPw | quote }}
  keycloak-username: {{ .Values.db.keycloakUser | quote }}
  keycloak-password: {{ $kcPw | quote }}
  # DSN consumed by the Go backend (go-sql-driver/mysql).
  dsn: {{ printf "%s:%s@tcp(craftverse-mariadb.%s.svc.cluster.local:3306)/%s?parseTime=true&loc=UTC" .Values.db.appUser $appPw .Release.Namespace .Values.db.craftverseDatabase | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: craftverse-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: craftverse
type: Opaque
stringData:
  admin-username: {{ .Values.keycloak.adminUsername | quote }}
  admin-password: {{ include "craftverse.password" (dict "ctx" . "explicit" "" "secret" "craftverse-keycloak" "secretKey" "admin-password") | quote }}
