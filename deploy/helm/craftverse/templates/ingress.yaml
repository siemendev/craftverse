{{- /*
Single host (Cloudflare's *.siemen.cloud edge cert only covers one label deep):
  /api  -> backend
  /auth -> keycloak
  /     -> frontend
Plus the cert-manager Certificate for the app host (origin cert behind Cloudflare).
*/ -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: craftverse
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: {{ .Values.tls.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.hosts.app | quote }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: craftverse-app
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik
  tls:
    - secretName: {{ .Values.tls.secretName }}
      hosts:
        - {{ .Values.hosts.app | quote }}
  rules:
    - host: {{ .Values.hosts.app | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
