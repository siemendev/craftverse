apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: backend
    app.kubernetes.io/part-of: craftverse
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      {{- include "craftverse.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: backend
          image: {{ include "craftverse.backendImage" . }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          env:
            - name: CRAFTVERSE_HTTP_ADDR
              value: ":{{ .Values.backend.port }}"
            - name: CRAFTVERSE_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: craftverse-db
                  key: dsn
            - name: CRAFTVERSE_OIDC_ISSUER
              value: {{ include "craftverse.oidcIssuer" . | quote }}
            - name: CRAFTVERSE_OIDC_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            - name: CRAFTVERSE_CORS_ORIGINS
              value: {{ printf "https://%s" .Values.hosts.app | quote }}
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: backend
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app: backend
