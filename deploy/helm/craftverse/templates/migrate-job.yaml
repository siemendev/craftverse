{{- /*
golang-migrate runner as a Helm hook, before the app rolls out.
Assumes the backend image's entrypoint binary is `/server` and that it exposes
a `migrate up` subcommand (the migrate service in docker-compose.yml uses the
same command). Adjust if the backend Dockerfile installs the binary elsewhere.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: craftverse-migrate
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  template:
    metadata:
      name: craftverse-migrate
    spec:
      restartPolicy: Never
      {{- include "craftverse.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: migrate
          image: {{ include "craftverse.backendImage" . }}
          command: ["/server", "migrate", "up"]
          env:
            - name: CRAFTVERSE_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: craftverse-db
                  key: dsn
