{{- /*
MariaDB operator (k8s.mariadb.com/v1alpha1) resources.
Field shapes verified against the live `mariadb` CR in the cluster.
No dedicated nodeSelector/tolerations (those were dzbot-specific).
*/ -}}
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: craftverse-mariadb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: craftverse
spec:
  image: {{ .Values.mariadb.image | quote }}
  replicas: 1
  port: 3306
  rootPasswordSecretKeyRef:
    name: craftverse-db
    key: root-password
    generate: false
  resources:
    {{- toYaml .Values.mariadb.resources | nindent 4 }}
  storage:
    size: {{ .Values.mariadb.storageSize | quote }}
    storageClassName: {{ .Values.mariadb.storageClass | quote }}
    resizeInUseVolumes: true
    waitForVolumeResize: true
---
# Application database.
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: craftverse
  namespace: {{ .Release.Namespace }}
spec:
  mariaDbRef:
    name: craftverse-mariadb
  name: {{ .Values.db.craftverseDatabase | quote }}
  characterSet: utf8mb4
  collate: utf8mb4_unicode_ci
  cleanupPolicy: Skip
---
# Keycloak database.
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
spec:
  mariaDbRef:
    name: craftverse-mariadb
  name: {{ .Values.db.keycloakDatabase | quote }}
  characterSet: utf8mb4
  collate: utf8mb4_unicode_ci
  cleanupPolicy: Skip
---
# Application user.
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: craftverse-app
  namespace: {{ .Release.Namespace }}
spec:
  mariaDbRef:
    name: craftverse-mariadb
  name: {{ .Values.db.appUser | quote }}
  host: "%"
  passwordSecretKeyRef:
    name: craftverse-db
    key: app-password
  cleanupPolicy: Skip
---
# Keycloak user.
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: craftverse-keycloak
  namespace: {{ .Release.Namespace }}
spec:
  mariaDbRef:
    name: craftverse-mariadb
  name: {{ .Values.db.keycloakUser | quote }}
  host: "%"
  passwordSecretKeyRef:
    name: craftverse-db
    key: keycloak-password
  cleanupPolicy: Skip
---
# Grant: app user -> craftverse database.
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: craftverse-app-grant
  namespace: {{ .Release.Namespace }}
spec:
  mariaDbRef:
    name: craftverse-mariadb
  username: {{ .Values.db.appUser | quote }}
  host: "%"
  database: {{ .Values.db.craftverseDatabase | quote }}
  table: "*"
  privileges:
    - "ALL PRIVILEGES"
  grantOption: false
  cleanupPolicy: Skip
---
# Grant: keycloak user -> keycloak database.
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: craftverse-keycloak-grant
  namespace: {{ .Release.Namespace }}
spec:
  mariaDbRef:
    name: craftverse-mariadb
  username: {{ .Values.db.keycloakUser | quote }}
  host: "%"
  database: {{ .Values.db.keycloakDatabase | quote }}
  table: "*"
  privileges:
    - "ALL PRIVILEGES"
  grantOption: false
  cleanupPolicy: Skip
