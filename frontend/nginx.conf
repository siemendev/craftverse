server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the runtime config or the HTML shell so config/env changes
    # and new deploys take effect immediately.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed build assets are immutable and safe to cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: everything else resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
